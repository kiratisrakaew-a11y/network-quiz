<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Network Security Quiz</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    min-height: 100vh;
    color: #e0e0e0;
    padding: 20px;
  }
  .container { max-width: 860px; margin: 0 auto; }

  header {
    text-align: center;
    padding: 30px 0 20px;
  }
  header h1 { font-size: 1.9rem; color: #00d4ff; letter-spacing: 1px; }
  header p { color: #a0c4d8; margin-top: 6px; font-size: 0.95rem; }

  /* Mode selector */
  .mode-bar {
    display: flex; gap: 10px; justify-content: center; margin-bottom: 24px; flex-wrap: wrap;
  }
  .mode-btn {
    padding: 8px 22px; border-radius: 20px; border: 2px solid #00d4ff;
    background: transparent; color: #00d4ff; cursor: pointer; font-size: 0.9rem;
    transition: all 0.2s;
  }
  .mode-btn.active, .mode-btn:hover { background: #00d4ff; color: #0f2027; font-weight: 700; }

  /* Stats bar */
  .stats-bar {
    display: flex; gap: 16px; justify-content: center; flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .stat {
    background: rgba(255,255,255,0.07);
    border-radius: 10px; padding: 8px 18px;
    text-align: center; min-width: 90px;
  }
  .stat-num { font-size: 1.5rem; font-weight: 700; color: #00d4ff; }
  .stat-label { font-size: 0.72rem; color: #a0c4d8; }

  /* Progress */
  .progress-wrap { margin-bottom: 20px; }
  .progress-info { display: flex; justify-content: space-between; font-size: 0.82rem; color: #a0c4d8; margin-bottom: 5px; }
  .progress-bar { background: rgba(255,255,255,0.1); border-radius: 10px; height: 8px; }
  .progress-fill { height: 8px; border-radius: 10px; background: linear-gradient(90deg, #00d4ff, #0096ff); transition: width 0.4s; }

  /* Card */
  .card {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(0,212,255,0.2);
    border-radius: 16px; padding: 28px; margin-bottom: 20px;
    backdrop-filter: blur(6px);
  }
  .q-meta { display: flex; gap: 10px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
  .q-num { background: #00d4ff; color: #0f2027; border-radius: 8px; padding: 3px 10px; font-size: 0.8rem; font-weight: 700; }
  .q-cat { background: rgba(0,212,255,0.15); border: 1px solid rgba(0,212,255,0.3); border-radius: 8px; padding: 3px 10px; font-size: 0.78rem; color: #00d4ff; }
  .question { font-size: 1.05rem; line-height: 1.6; color: #fff; margin-bottom: 22px; }

  /* Options */
  .options { display: flex; flex-direction: column; gap: 10px; }
  .option {
    padding: 12px 16px; border-radius: 10px;
    border: 1.5px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.04);
    cursor: pointer; transition: all 0.2s; font-size: 0.95rem; color: #dde;
    text-align: left;
  }
  .option:hover:not(.disabled) { border-color: #00d4ff; background: rgba(0,212,255,0.08); color: #fff; }
  .option.correct { border-color: #4cff72; background: rgba(76,255,114,0.12); color: #4cff72; }
  .option.wrong { border-color: #ff4c4c; background: rgba(255,76,76,0.12); color: #ff4c4c; }
  .option.disabled { cursor: default; }
  .option.reveal-correct { border-color: #4cff72; background: rgba(76,255,114,0.08); color: #4cff72; }

  /* Explanation */
  .explanation {
    display: none; margin-top: 16px; padding: 14px 16px;
    border-left: 3px solid #00d4ff; background: rgba(0,212,255,0.07);
    border-radius: 0 10px 10px 0; font-size: 0.9rem; line-height: 1.6; color: #c8e8f5;
  }
  .explanation.show { display: block; }
  .explanation strong { color: #00d4ff; }

  /* Nav */
  .nav { display: flex; gap: 12px; justify-content: space-between; flex-wrap: wrap; }
  .btn {
    padding: 11px 26px; border-radius: 10px; border: none; cursor: pointer;
    font-size: 0.95rem; font-weight: 600; transition: all 0.2s;
  }
  .btn-primary { background: #00d4ff; color: #0f2027; }
  .btn-primary:hover { background: #00b8db; }
  .btn-secondary { background: rgba(255,255,255,0.1); color: #e0e0e0; border: 1px solid rgba(255,255,255,0.2); }
  .btn-secondary:hover { background: rgba(255,255,255,0.18); }
  .btn:disabled { opacity: 0.4; cursor: default; }

  /* Result */
  .result-card {
    text-align: center; padding: 40px 30px;
    background: rgba(255,255,255,0.06); border-radius: 16px; border: 1px solid rgba(0,212,255,0.2);
  }
  .result-score { font-size: 4rem; font-weight: 800; color: #00d4ff; }
  .result-label { font-size: 1.1rem; color: #a0c4d8; margin-bottom: 8px; }
  .result-msg { font-size: 1.3rem; margin: 12px 0; }
  .result-breakdown {
    display: flex; gap: 20px; justify-content: center; margin: 24px 0; flex-wrap: wrap;
  }
  .rb { background: rgba(255,255,255,0.07); border-radius: 10px; padding: 12px 20px; min-width: 100px; }
  .rb-num { font-size: 1.6rem; font-weight: 700; }
  .rb-num.green { color: #4cff72; }
  .rb-num.red { color: #ff4c4c; }
  .rb-label { font-size: 0.75rem; color: #a0c4d8; }

  /* Search/filter */
  .filter-bar { display: flex; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; }
  .filter-bar input {
    flex: 1; min-width: 160px; padding: 9px 14px; border-radius: 10px;
    border: 1px solid rgba(0,212,255,0.3); background: rgba(255,255,255,0.06);
    color: #e0e0e0; font-size: 0.9rem;
  }
  .filter-bar input:focus { outline: none; border-color: #00d4ff; }
  .filter-bar select {
    padding: 9px 14px; border-radius: 10px; border: 1px solid rgba(0,212,255,0.3);
    background: #162530; color: #e0e0e0; font-size: 0.9rem; cursor: pointer;
  }

  /* Flashcard */
  .flashcard-wrap { perspective: 1000px; cursor: pointer; margin-bottom: 20px; min-height: 220px; }
  .flashcard {
    width: 100%; min-height: 220px; position: relative;
    transform-style: preserve-3d; transition: transform 0.5s;
  }
  .flashcard.flipped { transform: rotateY(180deg); }
  .fc-face {
    position: absolute; width: 100%; min-height: 220px;
    backface-visibility: hidden; border-radius: 16px; padding: 36px 28px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center;
  }
  .fc-front { background: rgba(0,212,255,0.1); border: 1.5px solid rgba(0,212,255,0.35); }
  .fc-back { background: rgba(76,255,114,0.07); border: 1.5px solid rgba(76,255,114,0.3); transform: rotateY(180deg); }
  .fc-hint { font-size: 0.75rem; color: #a0c4d8; margin-bottom: 12px; }
  .fc-text { font-size: 1.1rem; color: #fff; line-height: 1.6; }
  .fc-answer { font-size: 1.05rem; color: #4cff72; line-height: 1.6; }
  .fc-sub { font-size: 0.85rem; color: #a0c4d8; margin-top: 8px; }

  .hidden { display: none; }

  @media (max-width: 600px) {
    .nav { flex-direction: column; }
    .btn { width: 100%; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>🌐 Network Security Quiz</h1>
    <p>ISC2 CC · Network Fundamentals · 60 ข้อ</p>
  </header>

  <div class="mode-bar">
    <button class="mode-btn active" onclick="setMode('quiz')">📝 Quiz Mode</button>
    <button class="mode-btn" onclick="setMode('flash')">🃏 Flashcard</button>
    <button class="mode-btn" onclick="setMode('browse')">📚 Browse All</button>
  </div>

  <!-- QUIZ MODE -->
  <div id="quiz-mode">
    <div class="stats-bar">
      <div class="stat"><div class="stat-num" id="s-score">0</div><div class="stat-label">คะแนน</div></div>
      <div class="stat"><div class="stat-num" id="s-correct">0</div><div class="stat-label">ถูก ✅</div></div>
      <div class="stat"><div class="stat-num" id="s-wrong">0</div><div class="stat-label">ผิด ❌</div></div>
      <div class="stat"><div class="stat-num" id="s-remain">60</div><div class="stat-label">เหลือ</div></div>
    </div>
    <div class="progress-wrap">
      <div class="progress-info">
        <span id="prog-text">ข้อที่ 1 / 60</span>
        <span id="prog-pct">0%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
    </div>

    <div class="card" id="quiz-card">
      <div class="q-meta">
        <span class="q-num" id="q-num">Q1</span>
        <span class="q-cat" id="q-cat">Category</span>
      </div>
      <div class="question" id="q-text"></div>
      <div class="options" id="q-options"></div>
      <div class="explanation" id="q-exp"></div>
    </div>

    <div class="nav">
      <button class="btn btn-secondary" id="btn-prev" onclick="prevQ()" disabled>← ก่อนหน้า</button>
      <div style="display:flex;gap:10px;">
        <button class="btn btn-secondary" onclick="shuffleQuiz()">🔀 สุ่มใหม่</button>
        <button class="btn btn-primary" id="btn-next" onclick="nextQ()">ถัดไป →</button>
      </div>
    </div>

    <div id="result-section" class="hidden result-card" style="margin-top:20px;">
      <div class="result-label">ผลการทดสอบ</div>
      <div class="result-score" id="res-score"></div>
      <div style="font-size:0.9rem;color:#a0c4d8;">คะแนน</div>
      <div class="result-msg" id="res-msg"></div>
      <div class="result-breakdown">
        <div class="rb"><div class="rb-num green" id="res-c">0</div><div class="rb-label">ถูกต้อง</div></div>
        <div class="rb"><div class="rb-num red" id="res-w">0</div><div class="rb-label">ผิด</div></div>
        <div class="rb"><div class="rb-num" id="res-pct" style="color:#00d4ff;">0%</div><div class="rb-label">เปอร์เซ็นต์</div></div>
      </div>
      <button class="btn btn-primary" onclick="restartQuiz()" style="margin-top:10px;">🔄 ทำใหม่</button>
    </div>
  </div>

  <!-- FLASHCARD MODE -->
  <div id="flash-mode" class="hidden">
    <div class="stats-bar">
      <div class="stat"><div class="stat-num" id="fc-idx">1</div><div class="stat-label">ข้อ</div></div>
      <div class="stat"><div class="stat-num" id="fc-total">60</div><div class="stat-label">ทั้งหมด</div></div>
    </div>
    <div class="flashcard-wrap" onclick="flipCard()">
      <div class="flashcard" id="flashcard">
        <div class="fc-face fc-front">
          <div class="fc-hint">👆 แตะเพื่อดูเฉลย</div>
          <div class="fc-text" id="fc-q"></div>
          <div class="fc-sub" id="fc-cat-f"></div>
        </div>
        <div class="fc-face fc-back">
          <div class="fc-hint">✅ คำตอบ</div>
          <div class="fc-answer" id="fc-a"></div>
          <div class="fc-sub" id="fc-exp-f" style="color:#a0c4d8;margin-top:10px;"></div>
        </div>
      </div>
    </div>
    <div class="nav">
      <button class="btn btn-secondary" onclick="fcNav(-1)">← ก่อนหน้า</button>
      <button class="btn btn-secondary" onclick="shuffleFlash()">🔀 สุ่ม</button>
      <button class="btn btn-primary" onclick="fcNav(1)">ถัดไป →</button>
    </div>
  </div>

  <!-- BROWSE MODE -->
  <div id="browse-mode" class="hidden">
    <div class="filter-bar">
      <input type="text" id="search-input" placeholder="🔍 ค้นหาคำถาม..." oninput="renderBrowse()">
      <select id="cat-filter" onchange="renderBrowse()">
        <option value="">หมวดทั้งหมด</option>
      </select>
    </div>
    <div id="browse-list"></div>
  </div>

</div>

<script>
const questions = [
  // Network Devices & Basics
  { id:1, cat:"Network Devices & Basics", q:"Which device is used to control traffic flow on Networks?", opts:["Hub","Router","Switch","Firewall"], ans:2, exp:"Switches are wired devices that route traffic to specific devices rather than re-transmitting to all." },
  { id:2, cat:"Network Devices & Basics", q:"Which device is used to connect WAN to LAN?", opts:["Switch","Router","Hub","Modem"], ans:1, exp:"Routers control traffic flow and connect similar networks by determining the most efficient route." },
  { id:3, cat:"Network Devices & Basics", q:"At which layer of the TCP/IP protocol stack does a firewall operate?", opts:["Layer 2","Layer 3","Layer 4","Layer 7"], ans:2, exp:"Firewalls operate at the transport layer (Layer 4) to manage communication between applications." },
  { id:4, cat:"Network Devices & Basics", q:"Which of the following would be considered an endpoint?", opts:["Router","Switch","Laptop","Firewall"], ans:2, exp:"An endpoint is a computing device connected to a network with an IP address, such as a laptop." },
  { id:5, cat:"Network Devices & Basics", q:"What is the purpose of the Ethernet standard?", opts:["To define wireless connections","To define wired connections of network devices","To manage IP addresses","To encrypt data"], ans:1, exp:"The Ethernet standard defines wired connections of network devices." },
  { id:6, cat:"Network Devices & Basics", q:"Which layer of the OSI model is responsible for assigning MAC addresses to network devices?", opts:["Physical layer","Data link layer","Network layer","Transport layer"], ans:1, exp:"The Data Link layer (Layer 2) handles MAC addresses for network devices." },
  { id:7, cat:"Network Devices & Basics", q:"What is an IP address?", opts:["A physical address burned into hardware","A logical address associated with a unique network interface","A port number for services","An encryption key"], ans:1, exp:"An IP address is a logical address associated with a unique network interface within the network." },
  { id:8, cat:"Network Devices & Basics", q:"What is the key difference between a hub and a switch?", opts:["Hubs are faster","Switches route traffic to specific devices while hubs re-transmit to all","Hubs use more power","Switches are cheaper"], ans:1, exp:"Switches route traffic to specific devices while hubs re-transmit traffic to all connected devices." },
  { id:9, cat:"Network Devices & Basics", q:"What is an IPv4 address?", opts:["A 64-bit address","A 128-bit address","A 32-bit address used to uniquely identify devices","A MAC-based address"], ans:2, exp:"IPv4 uses a 32-bit address to uniquely identify devices on a network." },
  { id:10, cat:"Network Devices & Basics", q:"How does subnetting help improve network performance?", opts:["By increasing bandwidth","By reducing network congestion","By encrypting traffic","By assigning MAC addresses"], ans:1, exp:"Subnetting divides a larger network into smaller subnets, reducing network congestion and improving performance." },

  // Network Security Protocols
  { id:11, cat:"Network Security Protocols", q:"What is an IPsec replay attack?", opts:["Brute-forcing a password","Injecting packets into an existing session","DNS poisoning","MAC flooding"], ans:1, exp:"A replay attack involves an attacker attempting to inject previously captured packets into an existing session." },
  { id:12, cat:"Network Security Protocols", q:"How does IPsec protect against replay attacks?", opts:["Using MAC filtering","Using sequence numbers","Using encryption only","Using VLANs"], ans:1, exp:"IPsec uses sequence numbers to ensure no packets are duplicated or delayed, preventing replay attacks." },
  { id:13, cat:"Network Security Protocols", q:"What is the potential impact of an IPsec replay attack?", opts:["Only unauthorized access","Only disruption of communication","Only modification of traffic","All of the above"], ans:3, exp:"An IPsec replay attack can lead to unauthorized access, disruption of communication, and modification of traffic." },
  { id:14, cat:"Ports & Protocols", q:"What is the range of well-known ports?", opts:["1024 - 49151","49152 - 65535","0 - 1023","1 - 999"], ans:2, exp:"Well-known ports range from 0 to 1023 and are assigned to common services by IANA." },
  { id:15, cat:"Ports & Protocols", q:"What are registered ports used for?", opts:["System services only","Proprietary applications from vendors and developers","Dynamic connections only","IPv6 exclusively"], ans:1, exp:"Registered ports (1024-49151) are used for proprietary applications from vendors and developers." },
  { id:16, cat:"Ports & Protocols", q:"What is the range of dynamic or private ports?", opts:["0 - 1023","1024 - 49151","49152 - 65535","1000 - 9999"], ans:2, exp:"Dynamic/private ports range from 49,152 to 65,535 and are used for temporary connections." },
  { id:17, cat:"Ports & Protocols", q:"What protocol is associated with Port 53?", opts:["HTTP","SMTP","DNS","FTP"], ans:2, exp:"Port 53 is used by DNS (Domain Name System) for resolving domain names to IP addresses." },
  { id:18, cat:"Ports & Protocols", q:"Which of the following is an example of a registered port?", opts:["Port 80 (HTTP)","Port 22 (SSH)","Port 1433 (Microsoft SQL Server)","Port 443 (HTTPS)"], ans:2, exp:"Microsoft SQL Server uses ports 1433/1434, which fall in the registered port range (1024-49151)." },
  { id:19, cat:"Ports & Protocols", q:"What protocol is associated with port 80?", opts:["HTTPS","FTP","HTTP","SSH"], ans:2, exp:"Port 80 is the default port for HTTP (HyperText Transfer Protocol), used for unencrypted web traffic." },
  { id:20, cat:"Ports & Protocols", q:"Which port is commonly used for SSH?", opts:["21","22","23","25"], ans:1, exp:"SSH (Secure Shell) uses port 22 for secure remote administration." },
  { id:21, cat:"Ports & Protocols", q:"Which port is used by the FTP protocol?", opts:["20","21","22","23"], ans:1, exp:"FTP (File Transfer Protocol) uses port 21 for control connections (port 20 for data transfer)." },
  { id:22, cat:"Ports & Protocols", q:"Which port is used by the Telnet protocol?", opts:["21","22","23","25"], ans:2, exp:"Telnet uses port 23 for unencrypted remote terminal connections." },
  { id:23, cat:"Ports & Protocols", q:"What is the well-known port for SMTP?", opts:["25","53","80","110"], ans:0, exp:"SMTP (Simple Mail Transfer Protocol) uses port 25 for sending email." },
  { id:24, cat:"Ports & Protocols", q:"Which port is commonly used for HTTPS?", opts:["80","8080","443","8443"], ans:2, exp:"HTTPS (HTTP Secure) uses port 443 with SSL/TLS encryption." },
  { id:25, cat:"Ports & Protocols", q:"Which protocol is used by SSH for secure file transfers?", opts:["FTP","TFTP","SFTP","SCP"], ans:2, exp:"SFTP (SSH File Transfer Protocol) uses SSH to provide secure file transfer capabilities." },
  { id:26, cat:"Ports & Protocols", q:"What security feature is commonly used with HTTPS?", opts:["IPsec","SSL/TLS","WPA2","Kerberos"], ans:1, exp:"HTTPS uses SSL/TLS to encrypt data transmitted between the client and server." },
  { id:27, cat:"Ports & Protocols", q:"Which protocol is used for secure email?", opts:["SMTPS only","IMAPS only","POP3S only","All of the above (SMTPS, IMAPS, POP3S)"], ans:3, exp:"Secure email uses SMTPS, IMAPS, and POP3S — all of which add SSL/TLS encryption to standard email protocols." },

  // OSI Model Attacks
  { id:28, cat:"OSI Model & Attacks", q:"What layer of the OSI model is the target of a SYN flood attack?", opts:["Layer 2","Layer 3","Layer 4","Layer 7"], ans:2, exp:"SYN flood attacks target Layer 4 (Transport layer) by exhausting TCP connection resources." },
  { id:29, cat:"OSI Model & Attacks", q:"What layer of the OSI model is the target of a ping flood attack?", opts:["Layer 2","Layer 3","Layer 4","Layer 7"], ans:1, exp:"Ping flood attacks target Layer 3 (Network layer) using ICMP echo requests." },
  { id:30, cat:"OSI Model & Attacks", q:"What layer of the OSI model is the target of a Man-in-the-Middle (MITM) attack?", opts:["Layer 2","Layer 3","Layer 4","Layer 7"], ans:1, exp:"MITM attacks typically target Layer 3 (Network layer) where routing and IP addressing occur." },
  { id:31, cat:"OSI Model & Attacks", q:"What layer of the OSI model is the target of a buffer overflow attack?", opts:["Layer 2","Layer 3","Layer 4","Layer 7"], ans:3, exp:"Buffer overflow attacks target Layer 7 (Application layer) by exploiting application memory management." },
  { id:32, cat:"OSI Model & Attacks", q:"What layer of the OSI model is the target of a port scanning attack?", opts:["Layer 2","Layer 3","Layer 4","Layer 7"], ans:2, exp:"Port scanning targets Layer 4 (Transport layer) to discover open TCP/UDP ports." },
  { id:33, cat:"OSI Model & Attacks", q:"What layer of the OSI model is the target of a MAC flooding attack?", opts:["Layer 2","Layer 3","Layer 4","Layer 7"], ans:0, exp:"MAC flooding targets Layer 2 (Data Link layer) by overwhelming a switch's MAC address table." },
  { id:34, cat:"OSI Model & Attacks", q:"A hacker intercepts network traffic to steal login credentials. Which OSI layer is being attacked?", opts:["Physical layer","Data link layer","Network layer","Transport layer"], ans:1, exp:"Intercepting traffic for credential theft typically occurs at the Data Link layer where frames are captured." },
  { id:35, cat:"OSI Model & Attacks", q:"An employee opens an email attachment that installs malware. Which TCP/IP layer is being attacked?", opts:["Network layer","Transport layer","Application layer","Internet layer"], ans:2, exp:"Malware via email attachment exploits the Application layer where email clients operate." },
  { id:36, cat:"OSI Model & Attacks", q:"A hacker uses DNS spoofing to redirect a user to a fake website. Which OSI layer is being attacked?", opts:["Physical layer","Data link layer","Network layer","Application layer"], ans:3, exp:"DNS spoofing targets the Application layer where DNS resolution occurs." },
  { id:37, cat:"OSI Model & Attacks", q:"A hacker uses a MITM attack to intercept traffic and inject malicious code. Which TCP/IP layer is affected?", opts:["Network layer","Transport layer","Application layer","Internet layer"], ans:1, exp:"Code injection via MITM primarily affects the Transport layer where session data flows." },
  { id:38, cat:"OSI Model & Attacks", q:"A hacker uses a DDoS attack to flood a network. Which OSI layer is being attacked?", opts:["Data link layer","Network layer","Transport layer","Application layer"], ans:1, exp:"DDoS flooding attacks target the Network layer (Layer 3) by overwhelming routing infrastructure." },

  // Troubleshooting & Malware
  { id:39, cat:"Troubleshooting & Malware", q:"Network connectivity issues have been traced to a problem with the cabling. Which OSI layer is affected?", opts:["Data link layer","Network layer","Transport layer","Physical layer"], ans:3, exp:"Physical cabling issues affect the Physical layer (Layer 1) of the OSI model." },
  { id:40, cat:"Troubleshooting & Malware", q:"A user is unable to access a specific website. Which OSI layer is most likely affected?", opts:["Physical layer","Network layer","Transport layer","Application layer"], ans:3, exp:"Website access issues typically involve the Application layer (Layer 7) where web protocols operate." },
  { id:41, cat:"Troubleshooting & Malware", q:"An organization is experiencing frequent VPN disconnects. Which OSI layer is most likely affected?", opts:["Physical layer","Data link layer","Network layer","Transport layer"], ans:3, exp:"VPN connection issues typically involve the Transport layer (Layer 4) where TCP sessions are maintained." },
  { id:42, cat:"Troubleshooting & Malware", q:"A router is not configured properly leading to network congestion. Which OSI layer is most likely affected?", opts:["Physical layer","Data link layer","Network layer","Transport layer"], ans:2, exp:"Router configuration issues affect the Network layer (Layer 3) where routing decisions are made." },
  { id:43, cat:"Troubleshooting & Malware", q:"A user receives an email appearing to be from their bank requesting login credentials. What type of attack is this?", opts:["Vishing","Smishing","Phishing","Spear phishing"], ans:2, exp:"This is a classic phishing attack — fraudulent emails impersonating trusted organizations to steal credentials." },
  { id:44, cat:"Troubleshooting & Malware", q:"Which type of attack involves flooding a network or server with traffic to render it unavailable?", opts:["APT","Phishing","DoS / DDoS","Trojan"], ans:2, exp:"DoS/DDoS attacks overwhelm a network or server with traffic, making it unavailable to legitimate users." },
  { id:45, cat:"Troubleshooting & Malware", q:"A user clicks an email attachment believing it's from a friend, which installs malicious software. What type of malware is this?", opts:["Virus","Worm","Ransomware","Trojan"], ans:3, exp:"A Trojan disguises itself as legitimate software to trick users into installing it." },
  { id:46, cat:"Troubleshooting & Malware", q:"An attacker intercepts traffic between a user and a server to eavesdrop. What type of attack is this?", opts:["DoS attack","Replay attack","On-path attack","Insider threat"], ans:2, exp:"An on-path (MITM) attack positions the attacker between two parties to intercept communications." },

  { id:50, cat:"Troubleshooting & Malware", q:"A user enters credentials into a fake login page linked from an email. What type of attack is this?", opts:["Vishing","Phishing","Whaling","Smishing"], ans:1, exp:"This is a phishing attack — a fake login page designed to harvest user credentials." },

  // Cloud & Security Mechanisms
  { id:51, cat:"Cloud & Security", q:"Which cloud computing model is best for outsourcing core computing, storage, and network hardware?", opts:["SaaS","PaaS","IaaS","FaaS"], ans:2, exp:"IaaS (Infrastructure as a Service) provides virtualized computing resources including servers, storage, and networking." },
  { id:52, cat:"Cloud & Security", q:"Which security model assumes the network has no trusted space?", opts:["Defense in depth","Perimeter security","Zero trust","Least privilege"], ans:2, exp:"Zero trust assumes no implicit trust anywhere in the network — every access request must be verified." },
  { id:53, cat:"Cloud & Security", q:"Which mechanism can handle a high volume of network traffic without slowing down the system?", opts:["Firewall","IPS","Load balancing","VPN"], ans:2, exp:"Load balancing distributes network traffic across multiple servers to prevent any single server from becoming overwhelmed." },
  { id:54, cat:"Cloud & Security", q:"Which security mechanism authenticates the identity of users and devices before granting access?", opts:["Firewall","IDS","Identity and Access Management (IAM)","Encryption"], ans:2, exp:"IAM (Identity and Access Management) handles authentication and authorization for users and devices." },

  { id:60, cat:"Cloud & Security", q:"Which of the following is an agreement between a cloud service provider and a customer to set the quality of delivered services?", opts:["NDA (Non-Disclosure Agreement)","MOU (Memorandum of Understanding)","SLA (Service Level Agreement)","DPA (Data Processing Agreement)"], ans:2, exp:"An SLA (Service Level Agreement) defines the expected level of service quality between a provider and customer." },
];

// State
let quizOrder = [...Array(60).keys()];
let qIdx = 0;
let answered = new Array(60).fill(null); // null = not answered, index of chosen
let fcOrder = [...Array(60).keys()];
let fcIdx = 0;
let fcFlipped = false;
let currentMode = 'quiz';

function setMode(m) {
  currentMode = m;
  document.querySelectorAll('.mode-btn').forEach((b,i)=>{
    b.classList.toggle('active', ['quiz','flash','browse'][i]===m);
  });
  document.getElementById('quiz-mode').classList.toggle('hidden', m!=='quiz');
  document.getElementById('flash-mode').classList.toggle('hidden', m!=='flash');
  document.getElementById('browse-mode').classList.toggle('hidden', m!=='browse');
  if(m==='flash') renderFlash();
  if(m==='browse') initBrowse();
}

// --- QUIZ ---
function renderQuiz() {
  const qi = quizOrder[qIdx];
  const q = questions[qi];
  document.getElementById('q-num').textContent = `Q${q.id}`;
  document.getElementById('q-cat').textContent = q.cat;
  document.getElementById('q-text').textContent = q.q;

  const opts = document.getElementById('q-options');
  opts.innerHTML = '';
  q.opts.forEach((o,i)=>{
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.textContent = `${['A','B','C','D'][i]}. ${o}`;
    if(answered[qIdx] !== null) {
      btn.classList.add('disabled');
      if(i === q.ans) btn.classList.add('reveal-correct');
      if(i === answered[qIdx] && answered[qIdx] !== q.ans) btn.classList.add('wrong');
      if(i === answered[qIdx] && answered[qIdx] === q.ans) btn.classList.add('correct');
    } else {
      btn.onclick = () => selectAnswer(i);
    }
    opts.appendChild(btn);
  });

  const exp = document.getElementById('q-exp');
  exp.innerHTML = `<strong>💡 คำอธิบาย:</strong> ${q.exp}`;
  exp.classList.toggle('show', answered[qIdx] !== null);

  // progress
  const done = answered.filter(a=>a!==null).length;
  const pct = Math.round((done/60)*100);
  document.getElementById('prog-text').textContent = `ข้อที่ ${qIdx+1} / 60`;
  document.getElementById('prog-pct').textContent = pct+'%';
  document.getElementById('prog-fill').style.width = pct+'%';

  // stats
  const correct = answered.filter((a,i)=> a !== null && a === questions[quizOrder[i]].ans).length;
  const wrong = done - correct;
  document.getElementById('s-score').textContent = correct;
  document.getElementById('s-correct').textContent = correct;
  document.getElementById('s-wrong').textContent = wrong;
  document.getElementById('s-remain').textContent = 60 - done;

  document.getElementById('btn-prev').disabled = qIdx === 0;
  document.getElementById('btn-next').textContent = qIdx === 59 ? 'ดูผลลัพธ์ 🏁' : 'ถัดไป →';

  // result
  if(done === 60 && qIdx === 59) showResult();
  else document.getElementById('result-section').classList.add('hidden');
}

function selectAnswer(i) {
  if(answered[qIdx] !== null) return;
  answered[qIdx] = i;
  renderQuiz();
}

function nextQ() {
  if(qIdx < 59) { qIdx++; renderQuiz(); }
  else if(answered.filter(a=>a!==null).length === 60) showResult();
  else { qIdx++; if(qIdx<60) renderQuiz(); }
}
function prevQ() { if(qIdx>0){qIdx--;renderQuiz();} }

function showResult() {
  document.getElementById('result-section').classList.remove('hidden');
  const correct = answered.filter((a,i)=> a !== null && a === questions[quizOrder[i]].ans).length;
  const pct = Math.round((correct/60)*100);
  document.getElementById('res-score').textContent = correct+'/60';
  document.getElementById('res-c').textContent = correct;
  document.getElementById('res-w').textContent = 60-correct;
  document.getElementById('res-pct').textContent = pct+'%';
  let msg = pct>=90?'🏆 ยอดเยี่ยม! พร้อมสอบ ISC2 CC แล้ว':pct>=75?'👍 ดีมาก! ทบทวนอีกนิดเดียว':pct>=60?'📚 ผ่านได้ แต่ควรทบทวนเพิ่ม':'❌ ยังต้องทบทวนอีกมาก';
  document.getElementById('res-msg').textContent = msg;
}

function shuffleQuiz() {
  for(let i=quizOrder.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[quizOrder[i],quizOrder[j]]=[quizOrder[j],quizOrder[i]];}
  answered = new Array(60).fill(null);
  qIdx = 0;
  document.getElementById('result-section').classList.add('hidden');
  renderQuiz();
}
function restartQuiz() { answered=new Array(60).fill(null); qIdx=0; document.getElementById('result-section').classList.add('hidden'); renderQuiz(); }

// --- FLASHCARD ---
function renderFlash() {
  const q = questions[fcOrder[fcIdx]];
  document.getElementById('fc-q').textContent = q.q;
  document.getElementById('fc-cat-f').textContent = q.cat;
  document.getElementById('fc-a').textContent = q.opts[q.ans];
  document.getElementById('fc-exp-f').textContent = q.exp;
  document.getElementById('fc-idx').textContent = fcIdx+1;
  const fc = document.getElementById('flashcard');
  fc.classList.remove('flipped');
  fcFlipped = false;
}
function flipCard() {
  fcFlipped = !fcFlipped;
  document.getElementById('flashcard').classList.toggle('flipped', fcFlipped);
}
function fcNav(d) {
  fcIdx = (fcIdx+d+60)%60;
  renderFlash();
}
function shuffleFlash() {
  for(let i=fcOrder.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[fcOrder[i],fcOrder[j]]=[fcOrder[j],fcOrder[i]];}
  fcIdx=0; renderFlash();
}

// --- BROWSE ---
function initBrowse() {
  const cats = [...new Set(questions.map(q=>q.cat))];
  const sel = document.getElementById('cat-filter');
  sel.innerHTML = '<option value="">หมวดทั้งหมด</option>';
  cats.forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;sel.appendChild(o);});
  renderBrowse();
}
function renderBrowse() {
  const search = document.getElementById('search-input').value.toLowerCase();
  const cat = document.getElementById('cat-filter').value;
  const filtered = questions.filter(q=>
    (!cat || q.cat===cat) &&
    (!search || q.q.toLowerCase().includes(search) || q.opts.some(o=>o.toLowerCase().includes(search)))
  );
  const list = document.getElementById('browse-list');
  list.innerHTML = filtered.map(q=>`
    <div class="card" style="margin-bottom:14px;">
      <div class="q-meta"><span class="q-num">Q${q.id}</span><span class="q-cat">${q.cat}</span></div>
      <div class="question">${q.q}</div>
      <div style="margin-top:12px;">
        ${q.opts.map((o,i)=>`
          <div style="padding:8px 12px;border-radius:8px;margin-bottom:6px;font-size:0.9rem;
            ${i===q.ans?'background:rgba(76,255,114,0.1);border:1px solid rgba(76,255,114,0.4);color:#4cff72;':'background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);color:#aaa;'}">
            ${['A','B','C','D'][i]}. ${o} ${i===q.ans?'✅':''}
          </div>`).join('')}
      </div>
      <div class="explanation show" style="margin-top:10px;">💡 ${q.exp}</div>
    </div>`).join('');
}

// Init
renderQuiz();
</script>

</html>
